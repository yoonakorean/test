<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日語五十音與單字卡間隔學習系統</title>
  <!-- Canvas Confetti 煙火特效庫 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --primary: #4A90E2;
      --primary-hover: #357ABD;
      --success: #2ECC71;
      --error: #E74C3C;
      --warning: #F1C40F;
      --bg-color: #F7F9FC;
      --card-bg: #FFFFFF;
      --text-main: #2C3E50;
      --text-muted: #7F8C8D;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app-container {
      width: 100%;
      max-width: 550px;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
    }

    header {
      text-align: center;
      border-bottom: 2px solid #F0F3F7;
      padding-bottom: 15px;
    }

    header h1 {
      font-size: 1.4rem;
      color: var(--text-main);
      margin-bottom: 5px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background-color: #E9ECEF;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--primary);
      transition: width 0.3s ease;
    }

    .nav-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .card {
      background: #FAFCFE;
      border: 2px solid #E2E8F0;
      border-radius: 16px;
      padding: 30px 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      position: relative;
    }

    .card .main-text {
      font-size: 3.8rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.2;
    }

    .card .sub-text {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .audio-btn {
      background: #EBF3FE;
      border: none;
      color: var(--primary);
      padding: 10px 18px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 15px;
      transition: all 0.2s;
    }

    .audio-btn:hover {
      background: #D8E7FD;
    }

    .interactive-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      background-color: #FFFFFF;
      border: 2px solid #E2E8F0;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--primary);
      background-color: #F4F8FF;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      border: none;
      width: 100%;
    }

    .btn-primary:hover:not(:disabled) {
      background-color: var(--primary-hover);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .speech-btn {
      background-color: #FFF0F0;
      border: 2px solid #FFD6D6;
      color: #E74C3C;
      padding: 16px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .speech-btn.recording {
      background-color: #E74C3C;
      color: white;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
      70% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0); }
      100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
    }

    .feedback-panel {
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .feedback-panel.correct {
      background-color: #E8F8F0;
      color: #27AE60;
      border: 1px solid #A3E4D7;
      display: flex;
    }

    .feedback-panel.wrong {
      background-color: #FDEDEC;
      color: #C0392B;
      border: 1px solid #F9E79F;
      display: flex;
    }

    .feedback-panel .correct-answer {
      font-size: 0.95rem;
      color: var(--text-main);
    }

    .unit-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .unit-selector select {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #CBD5E1;
      font-size: 0.95rem;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="unit-selector">
      <select id="unitSelect" onchange="switchUnit()">
        <option value="1">單元一 (あ行字母 & 單字)</option>
        <option value="2">單元二 (か行字母 & 單字)</option>
      </select>
    </div>
    <h1 id="stageTitle">階段一：認識字母</h1>
    <div class="nav-controls">
      <span id="stepIndicator">Step 1 / 4</span>
      <span id="queueIndicator">剩餘卡片: 0</span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </header>

  <!-- 卡片主體區 -->
  <div class="card" id="cardArea">
    <div class="main-text" id="mainText">あ</div>
    <div class="sub-text" id="subText">a</div>
    <button class="audio-btn" id="playAudioBtn" onclick="playCurrentAudio()">
      🔊 播放發音
    </button>
  </div>

  <!-- 反饋與解答提示區 -->
  <div class="feedback-panel" id="feedbackPanel">
    <div id="feedbackText">答對了！</div>
    <div class="correct-answer hidden" id="correctAnswerText"></div>
    <button class="btn btn-primary" id="nextBtn" onclick="nextCard()">繼續</button>
  </div>

  <!-- 互動輸入區 -->
  <div class="interactive-area" id="interactiveArea">
    <!-- 動態生成按鈕或語音元件 -->
  </div>
</div>

<script>
// --- 資料庫定義 ---
const unitsData = {
  1: {
    stage1: [
      { id: 'u1_a', jp: 'あ', romaji: 'a' },
      { id: 'u1_i', jp: 'い', romaji: 'i' },
      { id: 'u1_u', jp: 'う', romaji: 'u' },
      { id: 'u1_e', jp: 'え', romaji: 'e' },
      { id: 'u1_o', jp: 'お', romaji: 'o' }
    ],
    stage2: [
      { id: 'u1_w1', jp: 'あい', zh: '愛', romaji: 'ai' },
      { id: 'u1_w2', jp: 'あお', zh: '藍色／青色', romaji: 'ao' },
      { id: 'u1_w3', jp: 'あう', zh: '見面', romaji: 'au' },
      { id: 'u1_w4', jp: 'いう', zh: '說', romaji: 'iu' },
      { id: 'u1_w5', jp: 'うえ', zh: '上面', romaji: 'ue' },
      { id: 'u1_w6', jp: 'おう', zh: '追', romaji: 'ou1' },
      { id: 'u1_w7', jp: 'おう', zh: '國王', romaji: 'ou2' }
    ]
  },
  2: {
    stage1: [
      { id: 'u2_ka', jp: 'か', romaji: 'ka' },
      { id: 'u2_ki', jp: 'き', romaji: 'ki' },
      { id: 'u2_ku', jp: 'く', romaji: 'ku' },
      { id: 'u2_ke', jp: 'け', romaji: 'ke' },
      { id: 'u2_ko', jp: 'こ', romaji: 'ko' }
    ],
    stage2: [
      { id: 'u2_w1', jp: 'あか', zh: '紅色', romaji: 'aka' },
      { id: 'u2_w2', jp: 'あき', zh: '秋天', romaji: 'aki' },
      { id: 'u2_w3', jp: 'あく', zh: '打開', romaji: 'aku' },
      { id: 'u2_w4', jp: 'いえ', zh: '家', romaji: 'ie' },
      { id: 'u2_w5', jp: 'いく', zh: '去', romaji: 'iku' },
      { id: 'u2_w6', jp: 'いか', zh: '魷魚／烏賊', romaji: 'ika' },
      { id: 'u2_w7', jp: 'いけ', zh: '池塘', romaji: 'ike' },
      { id: 'u2_w8', jp: 'えき', zh: '車站', romaji: 'eki' },
      { id: 'u2_w9', jp: 'おか', zh: '山丘', romaji: 'oka' }
    ]
  }
};

// --- 狀態控制變數 ---
let currentUnit = 1;
let currentStage = 1; // 1: 認識字母, 2: 認識單字
let currentStep = 1;
let cardQueue = [];
let currentCard = null;
let previousCardId = null;
let totalCardsCount = 0;
let firstTryCorrectCount = 0;
let isSecondAttempt = false;

// 語音辨識 API 初始化
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
}

// --- 初始化與切換 ---
window.onload = () => {
  initStage();
};

function switchUnit() {
  currentUnit = parseInt(document.getElementById('unitSelect').value);
  currentStage = 1;
  initStage();
}

function initStage() {
  currentStep = 1;
  firstTryCorrectCount = 0;
  
  // 取得目前階段的原始卡片清單
  let baseList = (currentStage === 1) 
    ? unitsData[currentUnit].stage1 
    : unitsData[currentUnit].stage2;

  // 洗牌並初始化佇列
  cardQueue = shuffle([...baseList]);
  totalCardsCount = cardQueue.length;
  
  updateHeaderUI();
  loadNextCardInStep();
}

function updateHeaderUI() {
  document.getElementById('stageTitle').innerText = 
    `階段${currentStage === 1 ? '一：認識字母' : '二：認識單字'}`;
  document.getElementById('stepIndicator').innerText = `Step ${currentStep} / ${currentStage === 1 ? 4 : 5}`;
  document.getElementById('queueIndicator').innerText = `剩餘卡片: ${cardQueue.length}`;
  
  let progress = ((totalCardsCount - cardQueue.length) / totalCardsCount) * 100;
  document.getElementById('progressBar').style.width = `${Math.max(progress, 0)}%`;
}

function loadNextCardInStep() {
  hideFeedback();
  isSecondAttempt = false;

  if (cardQueue.length === 0) {
    checkStagePromotion();
    return;
  }

  // 防連續重複邏輯
  let cardIndex = 0;
  if (cardQueue.length > 1 && cardQueue[0].id === previousCardId) {
    cardIndex = 1;
  }

  currentCard = cardQueue.splice(cardIndex, 1)[0];
  previousCardId = currentCard.id;

  updateHeaderUI();
  renderCardUI();
}

// --- UI 渲染邏輯 ---
function renderCardUI() {
  const mainText = document.getElementById('mainText');
  const subText = document.getElementById('subText');
  const playAudioBtn = document.getElementById('playAudioBtn');
  const interactiveArea = document.getElementById('interactiveArea');

  interactiveArea.innerHTML = '';
  mainText.classList.remove('hidden');
  subText.classList.remove('hidden');
  playAudioBtn.classList.remove('hidden');

  // ========== 階段一：認識字母 ==========
  if (currentStage === 1) {
    if (currentStep === 1) {
      // Step 1: 秀日文、羅馬拼音(字小) + 自動播放語音 + 口說跟讀
      mainText.innerText = currentCard.jp;
      subText.innerText = currentCard.romaji;
      playJpAudio(currentCard.jp);
      renderSpeechInput(true); // 自動跳過模式
    } 
    else if (currentStep === 2) {
      // Step 2: 秀日文選拼音（單元內選項）
      mainText.innerText = currentCard.jp;
      subText.innerText = '';
      renderOptions(unitsData[currentUnit].stage1, 'romaji', currentCard.romaji);
    } 
    else if (currentStep === 3) {
      // Step 3: 只有語音選日文
      mainText.innerText = '❓';
      subText.innerText = '';
      playJpAudio(currentCard.jp);
      renderOptions(unitsData[currentUnit].stage1, 'jp', currentCard.jp);
    } 
    else if (currentStep === 4) {
      // Step 4: 只秀日文，口說語音判別
      mainText.innerText = currentCard.jp;
      subText.innerText = '';
      renderSpeechInput(false);
    }
  } 
  // ========== 階段二：認識單字 ==========
  else {
    if (currentStep === 1) {
      // Step 1: 秀日文、中文(字小) + 自動語音 + 跟讀
      mainText.innerText = currentCard.jp;
      subText.innerText = currentCard.zh;
      playJpAudio(currentCard.jp);
      renderSpeechInput(true);
    } 
    else if (currentStep === 2) {
      // Step 2: 秀日文選中文
      mainText.innerText = currentCard.jp;
      subText.innerText = '';
      renderOptions(unitsData[currentUnit].stage2, 'zh', currentCard.zh);
    } 
    else if (currentStep === 3) {
      // Step 3: 秀中文選日文
      mainText.innerText = currentCard.zh;
      subText.innerText = '';
      renderOptions(unitsData[currentUnit].stage2, 'jp', currentCard.jp);
    } 
    else if (currentStep === 4) {
      // Step 4: 只有語音選日文
      mainText.innerText = '❓';
      subText.innerText = '';
      playJpAudio(currentCard.jp);
      renderOptions(unitsData[currentUnit].stage2, 'jp', currentCard.jp);
    } 
    else if (currentStep === 5) {
      // Step 5: 只秀日文，口說語音判別
      mainText.innerText = currentCard.jp;
      subText.innerText = '';
      renderSpeechInput(false);
    }
  }
}

// 渲染多選一按鈕
function renderOptions(sourceList, key, correctAnswer) {
  const interactiveArea = document.getElementById('interactiveArea');
  const grid = document.createElement('div');
  grid.className = 'options-grid';

  // 取得干擾項
  let options = [correctAnswer];
  let pool = sourceList.map(item => item[key]).filter(val => val !== correctAnswer);
  pool = shuffle(pool);
  
  while (options.length < Math.min(4, sourceList.length)) {
    let pick = pool.pop();
    if (pick && !options.includes(pick)) options.push(pick);
  }
  options = shuffle(options);

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.innerText = opt;
    btn.onclick = () => handleAnswer(opt === correctAnswer, correctAnswer);
    grid.appendChild(btn);
  });

  interactiveArea.appendChild(grid);
}

// 渲染語音錄音按鈕
function renderSpeechInput(autoAdvanceOnSuccess) {
  const interactiveArea = document.getElementById('interactiveArea');
  const speechBtn = document.createElement('button');
  speechBtn.className = 'speech-btn';
  speechBtn.id = 'speechBtn';
  speechBtn.innerHTML = '🎤 按下開始跟讀/口說';
  speechBtn.onclick = () => startListening(autoAdvanceOnSuccess);
  interactiveArea.appendChild(speechBtn);
}

// --- 語音判讀邏輯 ---
function startListening(autoAdvance) {
  if (!recognition) {
    alert('您的瀏覽器不支援 Web Speech API，將自動為您調過口說測驗。');
    handleAnswer(true, currentCard.jp);
    return;
  }

  const speechBtn = document.getElementById('speechBtn');
  speechBtn.classList.add('recording');
  speechBtn.innerHTML = '🎙️ 聆聽中...請發音';

  recognition.start();

  recognition.onresult = (event) => {
    speechBtn.classList.remove('recording');
    speechBtn.innerHTML = '🎤 按下開始跟讀/口說';

    const resultText = event.results[0][0].transcript;
    const confidence = event.results[0][0].confidence;

    // 相似度比對判定 (>= 70% 閥值)
    let isMatch = checkPronunciationMatch(resultText, currentCard.jp) && (confidence >= 0.65 || confidence === 0);

    if (isMatch) {
      if (autoAdvance) {
        showFeedback(true, '語音辨識成功！', '');
      } else {
        if (isSecondAttempt) {
          // 在 Step 4/5 錯過後重新試讀成功
          showFeedback(true, '二次嘗試成功！將加入錯題佇列。', '');
        } else {
          handleAnswer(true, currentCard.jp);
        }
      }
    } else {
      if (currentStep === (currentStage === 1 ? 4 : 5)) {
        // 發音錯誤特殊流程：顯示「再說一次」按紐，且把卡片加入錯題佇列
        isSecondAttempt = true;
        if (!cardQueue.some(c => c.id === currentCard.id)) {
          cardQueue.push(currentCard);
        }
        showFeedback(false, '辨識未達標，請重試！', `正確發音：${currentCard.jp}`);
        speechBtn.innerHTML = '🔄 再說一次';
      } else {
        handleAnswer(false, currentCard.jp);
      }
    }
  };

  recognition.onerror = () => {
    speechBtn.classList.remove('recording');
    speechBtn.innerHTML = '🎤 按下開始跟讀/口說';
    alert('收音失敗或未檢測到聲音，請再試一次。');
  };
}

function checkPronunciationMatch(spoken, target) {
  spoken = spoken.trim().toLowerCase();
  target = target.trim().toLowerCase();
  if (spoken === target) return true;
  if (spoken.includes(target) || target.includes(spoken)) return true;
  return false;
}

// --- 答題處理與錯題降級 ---
function handleAnswer(isCorrect, correctAnswer) {
  if (isCorrect) {
    if (!isSecondAttempt) {
      firstTryCorrectCount++;
    }
    playJpAudio(currentCard.jp);
    showFeedback(true, '答對了！', '');
  } else {
    // 答錯邏輯：將卡片加入佇列末端
    if (!cardQueue.some(c => c.id === currentCard.id)) {
      cardQueue.push(currentCard);
    }
    showFeedback(false, '答錯了！', `正確解答：${correctAnswer}`);
  }
}

function showFeedback(isCorrect, msg, correctInfo) {
  const panel = document.getElementById('feedbackPanel');
  const text = document.getElementById('feedbackText');
  const corrText = document.getElementById('correctAnswerText');

  panel.className = `feedback-panel ${isCorrect ? 'correct' : 'wrong'}`;
  text.innerText = msg;

  if (correctInfo) {
    corrText.innerText = correctInfo;
    corrText.classList.remove('hidden');
  } else {
    corrText.classList.add('hidden');
  }

  panel.style.display = 'flex';
}

function hideFeedback() {
  document.getElementById('feedbackPanel').style.display = 'none';
}

function nextCard() {
  loadNextCardInStep();
}

// --- 階段與 Step 關卡推演 ---
function checkStagePromotion() {
  let successRate = (firstTryCorrectCount / totalCardsCount) * 100;
  
  if (successRate >= 80) {
    // 成功關卡，解鎖特效
    triggerFireworks();
    playSuccessAudio();

    let maxStep = currentStage === 1 ? 4 : 5;
    if (currentStep < maxStep) {
      alert(`🎉 太棒了！答對率 ${Math.round(successRate)}%！晉級進入 Step ${currentStep + 1}`);
      currentStep++;
      initStage();
    } else {
      if (currentStage === 1) {
        alert(`🏆 恭喜完成【階段一：認識字母】！即將解鎖進入【階段二：認識單字】`);
        currentStage = 2;
        initStage();
      } else {
        alert(`🎉 恭喜通關本單元所有階段！已為您安排跨天數複習時程 (1, 3, 7, 14天)！`);
        saveSRSData();
      }
    }
  } else {
    alert(`答對率僅 ${Math.round(successRate)}%（未達80%標準）。別灰心，重新進入本 step 練習！`);
    initStage();
  }
}

// --- SRS 間隔學習儲存 ---
function saveSRSData() {
  let srsRecord = JSON.parse(localStorage.getItem('jp_srs_records') || '{}');
  let now = new Date();
  
  // 設置 1天, 3天, 7天, 14天 間隔
  let nextReview = new Date(now.setDate(now.getDate() + 1)).toISOString();
  
  srsRecord[`unit_${currentUnit}`] = {
    lastReviewed: new Date().toISOString(),
    nextReviewDate: nextReview,
    intervalStage: 1
  };
  
  localStorage.setItem('jp_srs_records', JSON.stringify(srsRecord));
}

// --- 語音發音與音效工具 ---
function playCurrentAudio() {
  if (currentCard) {
    playJpAudio(currentCard.jp);
  }
}

function playJpAudio(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ja-JP';
    utterance.rate = 0.8;
    window.speechSynthesis.speak(utterance);
  }
}

function playSuccessAudio() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
  osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
  osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); // G5
  osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.3); // C6
  
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
  
  osc.start();
  osc.stop(ctx.currentTime + 0.6);
}

function triggerFireworks() {
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 100,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
}

// 工具韓數：陣列隨機洗牌
function shuffle(array) {
  let cur = array.length, rand;
  while (cur !== 0) {
    rand = Math.floor(Math.random() * cur);
    cur--;
    [array[cur], array[rand]] = [array[rand], array[cur]];
  }
  return array;
}
