<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>韓文單字印記學習</title>
    <!-- 引入全球免費專業 Icon 庫 Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #5c4be2;
            --primary-light: #eef0ff;
            --dark-card: #12192c;
            --bg: #f5f7fc;
            --text-dark: #0f172a;
            --text-light: #94a3b8;
            --success: #2ecc71;
            --danger: #e74c3c;
            --orange: #ff9200;
        }

        /* 鎖定全螢幕，禁止不必要的上下捲動 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Noto Sans KR', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 手機外殼視窗 */
        .phone-window {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 920px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 頂部標題與進度 */
        .header {
            padding: 4vh 20px 1.5vh 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .title-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .unit-select {
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            background: none;
            color: var(--text-dark);
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }

        .badge-progress {
            background: var(--primary-light);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* 進度條容器 */
        .progress-container {
            width: 100%;
            padding: 10px 20px 0 20px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        /* 操作提示語 */
        .tip-text {
            color: var(--text-light);
            font-size: 0.8rem;
            margin: 1.5vh 0;
            text-align: center;
            flex-shrink: 0;
        }
        .tip-text span {
            background: #e2e8f0;
            color: var(--text-dark);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 2px;
        }

        /* 閃卡舞台 */
        .stage {
            flex: 1;
            padding: 0 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
        }

        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 100%;
            max-height: 520px;
            aspect-ratio: 3 / 4;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            box-sizing: border-box;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 正面樣式 (純白) */
        .card-front {
            background: white;
            border: 2px solid #eef2f6;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
        }

        /* 【優化防重疊】頂部資訊列佈局調校 */
        .card-top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 35px;
            position: relative;
            z-index: 10;
            gap: 8px; /* 加上間距防止擠壓 */
        }

        .category-tag {
            font-weight: bold;
            font-size: 0.9rem;
            white-space: nowrap; /* 防止中文換行 */
            flex-shrink: 0;
        }
        .card-front .category-tag { color: var(--text-dark); }
        .card-back .category-tag { color: #64748b; }

        .stamp-tag {
            background: #e8f8f0;
            color: var(--success);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: auto; /* 自動將已蓋印推向中間偏右 */
        }
        .stamp-tag.active { opacity: 1; }

        /* 右上角語音播放鍵 (正反面統一位置) */
        .btn-top-action {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 6px;
            transition: transform 0.2s, color 0.2s;
            flex-shrink: 0;
        }
        .card-front .btn-top-action { color: var(--text-dark); }
        .card-back .btn-top-action { color: #ffffff; } 
        .btn-top-action.playing { color: var(--primary) !important; }

        /* 正面大中央：麥克風錄音 */
        .center-action-box {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
            margin-bottom: 5px;
        }

        .btn-center-circle {
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: var(--primary-light);
            color: var(--primary);
        }
        .btn-center-circle.recording {
            background: #fde8e8;
            color: var(--danger);
            animation: pulse 1.3s infinite;
        }
        .btn-center-circle:active { transform: scale(0.92); }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        /* 圖片容器 */
        .img-container {
            width: 100%;
            height: 250px;
            margin: 1.5vh 0;
            border: 2px solid #eef2f6;
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
        }

        .vocab-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .no-img-text {
            color: var(--text-light);
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* 反面樣式 (深色) */
        .card-back {
            background: var(--dark-card);
            transform: rotateY(180deg);
            color: white;
        }

        /* 反面核心內文區 */
        .back-main-content {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            min-height: 150px;
        }

        .korean-word {
            font-size: 3.5rem;
            font-weight: bold;
            color: #ffffff;
            margin: 0;
            letter-spacing: 1px;
            text-align: center;
        }

        /* 韓文發音標記 */
        .korean-pronunciation {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--orange);
            background: rgba(255, 146, 0, 0.15);
            padding: 4px 16px;
            border-radius: 30px;
            letter-spacing: 1px;
            margin: 0;
        }

        /* 底部釋義與控制區外殼容器 */
        .definition-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 5px;
        }

        /* 控制列 */
        .back-control-row {
            position: absolute;
            top: -45px; 
            right: 10px;    
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 15;
        }

        /* 中文答案彈出小方框 */
        .chinese-answer-badge {
            background: var(--orange);
            color: white;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transform: translateY(5px);
            transition: all 0.2s ease;
        }
        .chinese-answer-badge.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* 燈泡💡按鈕 */
        .btn-inline-lightbulb {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1.1rem;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-inline-lightbulb.active {
            background: var(--orange);
            color: white;
        }

        /* 反面最下方釋義區 */
        .definition-block {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            font-size: 0.95rem;
            color: #94a3b8;
            line-height: 1.6;
            height: 95px; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            width: 100%;
            overflow-y: auto; 
        }

        /* 底部導覽列 */
        .nav-footer {
            padding: 2vh 25px 4vh 25px;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .btn-nav {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-prev {
            background: white;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }

        .btn-next {
            background: var(--primary);
            color: white;
        }
        
        /* 狀態提示框 */
        .status-toast {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 99;
            white-space: nowrap;
        }
    </style>
</head>
<body onclick="handleGlobalClick()">

<div class="phone-window">
    <!-- 頂部標頭 -->
    <div class="header">
        <div class="title-area">
            <i class="fa-solid fa-book-open" style="color: var(--primary); font-size: 1.1rem;"></i>
            <select class="unit-select" id="unitSelector" onchange="changeUnit(this.value)">
                <option value="unit1">單元一</option>
                <option value="unit2">單元二</option>
            </select>
        </div>
        <div class="badge-progress" id="progressText">學習進度 : 0 / 0</div>
    </div>

    <!-- 進度條 -->
    <div class="progress-container">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>

    <!-- 操作提示 -->
    <div class="tip-text">
        <span>Space</span> 翻面 ｜ 滑動或 <span>←</span> / <span>→</span> 切換字卡
    </div>

    <!-- 卡片舞台 -->
    <div class="stage">
        <div class="card-container" id="swipeArea">
            <div class="card" id="vocabCard" onclick="flipCard(event)">
                
                <!-- 正面 (白色) -->
                <div class="card-face card-front">
                    <div class="card-top-info">
                        <span class="category-tag" id="frontCategory">分類</span>
                        <span class="stamp-tag" id="stampTag_front">✓ 已蓋印</span>
                        <button class="btn-top-action" id="speakerFront" onclick="speakStandard(event)">
                            <i class="fa-solid fa-volume-high"></i>
                        </button>
                    </div>
                    
                    <div class="img-container">
                        <img src="" alt="單字圖片" class="vocab-img" id="vocabImg" style="display:none;">
                        <span class="no-img-text" id="noImgText"> canva 圖片放置區 </span>
                    </div>

                    <div class="center-action-box">
                        <button class="btn-center-circle" id="btnMic" onclick="toggleRecord(event)">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                    </div>
                </div>

                <!-- 反面 (深色) -->
                <div class="card-face card-back">
                    <div class="card-top-info">
                        <span class="category-tag" id="backCategory">分類</span>
                        <span class="stamp-tag" id="stampTag_back">✓ 已蓋印</span>
                        <button class="btn-top-action" id="speakerBack" onclick="speakStandard(event)">
                            <i class="fa-solid fa-volume-high"></i>
                        </button>
                    </div>

                    <!-- 反面核心內文區 -->
                    <div class="back-main-content">
                        <h1 class="korean-word" id="koreanWord">韓文單字</h1>
                        <span class="korean-pronunciation" id="koreanPron">發音標記</span>
                    </div>

                    <!-- 底部釋義與新中文控制區 -->
                    <div class="definition-wrapper">
                        
                        <!-- 控制列 -->
                        <div class="back-control-row">
                            <div class="chinese-answer-badge" id="chineseAnswerBox">
                                <span id="hintPart">詞性</span> ｜ <span id="hintCh">中文意思</span>
                            </div>
                            <button class="btn-inline-lightbulb" id="btnLightbulb" onclick="toggleTooltip(event)">
                                <i class="fa-solid fa-lightbulb"></i>
                            </button>
                        </div>

                        <!-- 加大的釋義區塊 -->
                        <div class="definition-block" id="definitionText">
                            釋義
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- 底部導覽按鈕 -->
    <div class="nav-footer">
        <button class="btn-nav btn-prev" onclick="prevCard(event)"><i class="fa-solid fa-chevron-left"></i> 上一個</button>
        <button class="btn-nav btn-next" onclick="nextCard(event)">下一個 <i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <!-- 狀態提示框 -->
    <div class="status-toast" id="statusToast">提示訊息</div>
</div>

<script>
    // ==========================================
    // 【 系統全字典數據庫 】 (已修正 콜라)
    // ==========================================
    const vocabDictionary = {
        "짐": { ch: "行李/貨物", part: "名詞", cate: "生活", pron: "[짐]", def: "旅行或搬家時攜帶的物品箱包", img: "" },
        "볼펜": { ch: "原子筆", part: "名詞", cate: "文具", pron: "[볼펜]", def: "筆尖有小滾珠、書寫流暢的筆", img: "" },
        "담요": { ch: "毯子", part: "名詞", cate: "生活", pron: "[담뇨]", def: "睡覺或保暖時蓋在身上的厚織物（音變現象）", img: "" },
        "휴지": { ch: "衛生紙", part: "名詞", cate: "生活", pron: "[휴지]", def: "用來擦拭髒污或擦手的薄紙張", img: "" },
        "시계": { ch: "手錶/時鐘", part: "名詞", cate: "生活", pron: "[시계]", def: "用來觀看、計算時間的機械或電子儀器", img: "" },
        "지우개": { ch: "橡皮擦", part: "名詞", cate: "文具", pron: "[지우개]", def: "用來擦除鉛筆字跡的工具", img: "" },
        "컴퓨터": { ch: "電腦", part: "名詞", cate: "電子", pron: "[컴퓨터]", def: "進行資料處理與上網運算的電子計算機", img: "" },
        "라면": { ch: "泡麵", part: "名詞", cate: "食物", pron: "[라면]", def: "油炸過、加熱水與調味包即可食用的速食麵", img: "" },
        "콜라": { ch: "可樂", part: "名詞", cate: "飲料", pron: "[콜라]", def: "一種黑色的碳酸甜味氣泡飲料", img: "" }, // 這裡已修正為 콜라
        "지갑": { ch: "錢包", part: "名詞", cate: "生活", pron: "[지갑]", def: "用來收納現金、信用卡和證件的小包", img: "" },
        "커피": { ch: "咖啡", part: "名詞", cate: "飲料", pron: "[커피]", def: "用烘焙咖啡豆萃取出的提神苦味飲品。拉高後的區塊能提供非常舒適的閱讀排版空間，保持畫面一致性。", img: "" },
        "메뉴": { ch: "菜單", part: "名詞", cate: "餐飲", pron: "[메뉴]", def: "餐廳內記載菜色名稱與價格的單子", img: "" },
        "우산": { ch: "雨傘", part: "名詞", cate: "生活", pron: "[우산]", def: "下雨天用來遮雨、擋水的隨身工具", img: "" },

        "하나": { ch: "一 (固有詞)", part: "數詞", cate: "數字", pron: "[하나]", def: "數字中的第一個，表示單一數量", img: "" },
        "둘": { ch: "二 (固有詞)", part: "數詞", cate: "數字", pron: "[둘]", def: "一加上一之後的數量", img: "" },
        "셋": { ch: "三 (固有詞)", part: "數詞", cate: "數字", pron: "[섿]", def: "二加上一之後的數量（尾音代表音）", img: "" },
        "넷": { ch: "四 (固有詞)", part: "數詞", cate: "數字", pron: "[넫]", def: "三加上一之後的數量", img: "" },
        "다섯": { ch: "五 (固有詞)", part: "數詞", cate: "數字", pron: "[다섣]", def: "四加上一之後的數量", img: "" },
        "여섯": { ch: "六 (固有詞)", part: "數詞", cate: "數字", pron: "[여섣]", def: "五加上一之後的數量", img: "" },
        "일곱": { ch: "七 (固有詞)", part: "數詞", cate: "數字", pron: "[일곱]", def: "六加上一之後的數量", img: "" },
        "여덟": { ch: "八 (固有詞)", part: "數詞", cate: "數字", pron: "[여덜]", def: "七加上一之後的數量（雙尾音發音）", img: "" },
        "아홉": { ch: "九 (固有詞)", part: "數詞", cate: "數字", pron: "[아홉]", def: "八加上一之後的數量", img: "" },
        "열": { ch: "十 (固有詞)", part: "數詞", cate: "數字", pron: "[열]", def: "九加上一之後的數量", img: "" },
        "손님": { ch: "客人", part: "名詞", cate: "社交", pron: "[손님]", def: "前來拜訪、消費或接受招待的人", img: "" },
        "정장": { ch: "正裝/西裝", part: "名詞", cate: "服飾", pron: "[정장]", def: "出席正式場合穿著的規格服飾", img: "" },
        "맥주": { ch: "啤酒", part: "名詞", cate: "飲料", pron: "[맥쭈]", def: "大麥發酵、含有氣泡與微量酒精的飲料（緊音化）", img: "" },
        "잡지": { ch: "雜誌", part: "名詞", cate: "書籍", pron: "[잡찌]", def: "定期出版、包含多種話題與圖片的刊物（緊音化）", img: "" },
        "여권": { ch: "護照", part: "名詞", cate: "旅遊", pron: "[여꿘]", def: "出入國境時，政府用來證明身分官方手冊（緊音化）", img: "" },
        "핸드폰": { ch: "手機", part: "名詞", cate: "電子", pron: "[핸드폰]", def: "可以隨身攜帶、打電話與上網的無線移動電話", img: "" }
    };

    const unitData = {
        unit1: ["짐", "볼펜", "담요", "휴지", "시계", "지우개", "컴퓨터", "라면", "콜拉", "지갑", "커피", "메뉴", "우산"], // 這裡的對應鍵名也一併支援
        unit2: ["하나", "둘", "셋", "넷", "다섯", "여섯", "일곱", "여덟", "아홉", "열", "손님", "정장", "맥주", "잡지", "여권", "핸드폰"]
    };

    // 處理鍵值對應相容（將舊的 "콜拉" 鍵自動映射至正確的字典資料）
    vocabDictionary["콜拉"] = vocabDictionary["콜라"];

    let currentUnit = "unit1";      
    let currentWords = [];          
    let currentIndex = 0;           
    let passedWordsMap = {};        
    
    let isRecording = false;
    let recognition = null;
    let singleSpeechTimer = null; 
    let touchStartX = 0;
    let touchEndX = 0;

    let globalIdleTimer = null;   
    const IDLE_LIMIT = 5 * 60 * 1000; 

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ko-KR';
        recognition.interimResults = false;

        recognition.onresult = function(event) {
            clearTimeout(singleSpeechTimer);
            stopRecordState();

            const studentSpeech = event.results[0][0].transcript.replace(/\s+/g, "");
            let targetWord = currentWords[currentIndex].replace(/\s+/g, "");
            if (targetWord === "콜라" || targetWord === "콜拉") targetWord = "콜라";

            const originalIndex = unitData[currentUnit].indexOf(currentWords[currentIndex]);

            if (studentSpeech === "콜라" && (targetWord === "콜라" || targetWord === "콜拉") || studentSpeech === targetWord) {
                showToast("🎉 發音正確！印記已蓋上！");
                if (originalIndex !== -1) {
                    passedWordsMap[currentUnit].add(originalIndex);
                }
                updateProgress();
            } else {
                showToast(`😢 聽起來像「${studentSpeech}」，再試一次！`);
            }
            resetIdleTimer();
        };

        recognition.onend = function() { if (isRecording) stopRecordState(); };
        recognition.onerror = function() { stopRecordState(); showToast("錄音辨識出錯。"); };
    }

    function resetIdleTimer() {
        clearTimeout(globalIdleTimer);
        globalIdleTimer = setTimeout(triggerMicrophoneSleep, IDLE_LIMIT);
    }

    function triggerMicrophoneSleep() {
        if (isRecording && recognition) recognition.stop();
        stopRecordState();
    }

    ['click', 'touchstart', 'keydown'].forEach(evt => {
        document.addEventListener(evt, resetIdleTimer, { passive: true });
    });

    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function changeUnit(unitKey) {
        if (isRecording) return;
        currentUnit = unitKey;
        currentIndex = 0;
        if (!passedWordsMap[currentUnit]) passedWordsMap[currentUnit] = new Set();
        currentWords = shuffleArray(unitData[unitKey] || []);
        renderCard();
        updateProgress();
    }

    function renderCard() {
        let wordName = currentWords[currentIndex];
        // 畫面上顯示修正後的正體字
        let displayWord = wordName === "콜拉" ? "콜라" : wordName;

        const data = vocabDictionary[wordName] || { ch: "未定義", part: "未知", cate: "一般", pron: "[]", def: "", img: "" };
        
        hideTooltip();
        document.getElementById('vocabCard').classList.remove('is-flipped');

        document.getElementById('frontCategory').innerText = data.cate;
        if (data.img && data.img.trim() !== "") {
            document.getElementById('vocabImg').src = data.img;
            document.getElementById('vocabImg').style.display = "block";
            document.getElementById('noImgText').style.display = "none";
        } else {
            document.getElementById('vocabImg').style.display = "none";
            document.getElementById('noImgText').style.display = "block";
        }

        document.getElementById('backCategory').innerText = data.cate;
        document.getElementById('koreanWord').innerText = displayWord;
        document.getElementById('koreanPron').innerText = data.pron;
        document.getElementById('hintPart').innerText = data.part;
        document.getElementById('hintCh').innerText = data.ch;
        document.getElementById('definitionText').innerText = data.def;

        updateProgress();
    }

    function updateProgress() {
        const total = currentWords.length;
        const passedCount = passedWordsMap[currentUnit] ? passedWordsMap[currentUnit].size : 0;
        
        document.getElementById('progressText').innerText = `學習進度 : ${passedCount} / ${total}`;
        document.getElementById('progressBar').style.width = `${total > 0 ? (passedCount / total) * 100 : 0}%`;

        const wordName = currentWords[currentIndex];
        const originalIndex = unitData[currentUnit].indexOf(wordName);
        const stampFront = document.getElementById('stampTag_front');
        const stampBack = document.getElementById('stampTag_back');
        
        if (originalIndex !== -1 && passedWordsMap[currentUnit] && passedWordsMap[currentUnit].has(originalIndex)) {
            stampFront.classList.add('active');
            stampBack.classList.add('active');
        } else {
            stampFront.classList.remove('active');
            stampBack.classList.remove('active');
        }
    }

    function flipCard(event) {
        if (isRecording) return;
        if (event.target.closest('#btnLightbulb') || event.target.closest('.btn-top-action')) return;
        document.getElementById('vocabCard').classList.toggle('is-flipped');
    }

    function prevCard(event) {
        if (event) event.stopPropagation();
        if (isRecording) return;
        if (currentIndex > 0) {
            currentIndex--;
            renderCard();
        } else {
            showToast("這是第一個單字囉！");
        }
    }

    function nextCard(event) {
        if (event) event.stopPropagation();
        if (isRecording) return;
        if (currentIndex < currentWords.length - 1) {
            currentIndex++;
            renderCard();
        } else {
            showToast("這是最後一個單字囉！");
        }
    }

    function speakStandard(event) {
        if (event) event.stopPropagation(); 
        if (isRecording) return; 

        let targetText = currentWords[currentIndex];
        if (targetText === "콜拉") targetText = "콜라";
        if (!targetText) return;
        
        try {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(targetText);
            utterance.lang = 'ko-KR'; 
            utterance.rate = 0.85; 

            const spkFront = document.getElementById('speakerFront');
            const spkBack = document.getElementById('speakerBack');
            spkFront.classList.add('playing');
            spkBack.classList.add('playing');
            
            utterance.onend = () => {
                spkFront.classList.remove('playing');
                spkBack.classList.remove('playing');
            };

            window.speechSynthesis.speak(utterance);
        } catch(e) { console.error(e); }
    }

    function toggleRecord(event) {
        if (event) event.stopPropagation(); 
        if (!recognition) { showToast("瀏覽器不支援錄音。"); return; }

        resetIdleTimer(); 

        if (!isRecording) {
            isRecording = true;
            document.getElementById('btnMic').classList.add('recording');
            showToast("🎤 錄音中，請開始發音...");
            try { recognition.start(); } catch(e) {}

            singleSpeechTimer = setTimeout(() => {
                if (isRecording) {
                    recognition.stop();
                    showToast("⏰ 偵測不到聲音，麥克風已關閉");
                }
            }, 5000);
        } else {
            recognition.stop();
        }
    }

    function stopRecordState() {
        clearTimeout(singleSpeechTimer);
        isRecording = false;
        document.getElementById('btnMic').classList.remove('recording');
    }

    function toggleTooltip(event) {
        event.stopPropagation(); 
        const ansBox = document.getElementById('chineseAnswerBox');
        const bulb = document.getElementById('btnLightbulb');
        ansBox.classList.toggle('show');
        bulb.classList.toggle('active');
    }

    function handleGlobalClick() {
        hideTooltip();
    }

    function hideTooltip() {
        document.getElementById('chineseAnswerBox').classList.remove('show');
        document.getElementById('btnLightbulb').classList.remove('active');
    }

    function showToast(msg) {
        const toast = document.getElementById('statusToast');
        toast.innerText = msg;
        toast.style.opacity = "1";
        setTimeout(() => { toast.style.opacity = "0"; }, 2300);
    }

    document.addEventListener('keydown', function(e) {
        if (e.code === 'Space') { e.preventDefault(); document.getElementById('vocabCard').classList.toggle('is-flipped'); }
        else if (e.code === 'ArrowLeft') { prevCard(); }
        else if (e.code === 'ArrowRight') { nextCard(); }
    });

    const swipeArea = document.getElementById('swipeArea');
    swipeArea.addEventListener('touchstart', function(e) {
        if (e.target.closest('button')) return;
        touchStartX = e.changedTouches[0].screenX;
    }, false);

    swipeArea.addEventListener('touchend', function(e) {
        if (e.target.closest('button')) return;
        touchEndX = e.changedTouches[0].screenX;
        const threshold = 60;
        if (touchStartX - touchEndX > threshold) nextCard();
        else if (touchEndX - touchStartX > threshold) prevCard();
    }, false);

    window.onload = () => { changeUnit("unit1"); resetIdleTimer(); };
</script>
</body>
</html>
