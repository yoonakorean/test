<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日語五十音與單字卡間隔學習系統</title>
  <!-- Canvas Confetti 煙火特效庫 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --primary: #4A90E2;
      --primary-hover: #357ABD;
      --success: #2ECC71;
      --error: #E74C3C;
      --warning: #F1C40F;
      --bg-color: #F7F9FC;
      --card-bg: #FFFFFF;
      --text-main: #2C3E50;
      --text-muted: #7F8C8D;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app-container {
      width: 100%;
      max-width: 550px;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
    }

    header {
      text-align: center;
      border-bottom: 2px solid #F0F3F7;
      padding-bottom: 15px;
    }

    header h1 {
      font-size: 1.4rem;
      color: var(--text-main);
      margin-bottom: 5px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background-color: #E9ECEF;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--primary);
      transition: width 0.3s ease;
    }

    .nav-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .card {
      background: #FAFCFE;
      border: 2px solid #E2E8F0;
      border-radius: 16px;
      padding: 25px 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 250px;
      position: relative;
    }

    .card .main-text {
      font-size: 3.8rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.2;
    }

    .card .sub-text {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .stroke-animation-container {
      width: 100px;
      height: 100px;
      border: 1px dashed #CBD5E1;
      border-radius: 12px;
      background: #FFFFFF;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 10px;
      position: relative;
    }

    .stroke-animation-container svg {
      width: 80px;
      height: 80px;
    }

    .stroke-path {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawStroke 2.5s ease-in-out infinite;
    }

    @keyframes drawStroke {
      0% { stroke-dashoffset: 500; }
      50% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 0; }
    }

    .audio-btn {
      background: #EBF3FE;
      border: none;
      color: var(--primary);
      padding: 10px 18px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      transition: all 0.2s;
    }

    .audio-btn:hover {
      background: #D8E7FD;
    }

    .interactive-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      background-color: #FFFFFF;
      border: 2px solid #E2E8F0;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--primary);
      background-color: #F4F8FF;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      border: none;
      width: 100%;
    }

    .btn-remember {
      background-color: #2ECC71;
      color: white;
      border: none;
      flex: 1;
      padding: 16px;
      font-size: 1.1rem;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-review {
      background-color: #E74C3C;
      color: white;
      border: none;
      flex: 1;
      padding: 16px;
      font-size: 1.1rem;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .self-eval-container {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .feedback-panel {
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .feedback-panel.correct {
      background-color: #E8F8F0;
      color: #27AE60;
      border: 1px solid #A3E4D7;
      display: flex;
    }

    .feedback-panel.wrong {
      background-color: #FDEDEC;
      color: #C0392B;
      border: 1px solid #F9E79F;
      display: flex;
    }

    .unit-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .unit-selector select {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #CBD5E1;
      font-size: 0.95rem;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="unit-selector">
      <select id="unitSelect" onchange="switchUnit()">
        <option value="1">單元一 (あ行字母 & 單字)</option>
        <option value="2">單元二 (か行字母 & 單字)</option>
      </select>
    </div>
    <h1 id="stageTitle">階段一：認識字母</h1>
    <div class="nav-controls">
      <span id="stepIndicator">解鎖題型: Step 1</span>
      <span id="queueIndicator">待複習卡片: 0</span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </header>

  <!-- 卡片主體區 -->
  <div class="card" id="cardArea">
    <div class="stroke-animation-container hidden" id="strokeContainer">
      <svg id="strokeSvg" viewBox="0 0 100 100"></svg>
    </div>

    <div class="main-text" id="mainText">あ</div>
    <div class="sub-text" id="subText">a</div>
    <button class="audio-btn" id="playAudioBtn" onclick="playCurrentAudio()">
      🔊 播放發音
    </button>
  </div>

  <!-- 反饋提示區 -->
  <div class="feedback-panel" id="feedbackPanel">
    <div id="feedbackText">正解提示</div>
    <div class="correct-answer" id="correctAnswerText"></div>
    <button class="btn btn-primary" id="nextBtn" onclick="nextCard()">繼續</button>
  </div>

  <!-- 互動輸入區 -->
  <div class="interactive-area" id="interactiveArea"></div>
</div>

<script>
const strokePaths = {
  'あ': ['M20,35 Q50,30 80,35', 'M50,15 Q45,60 48,85', 'M35,45 C20,70 60,90 75,65 C85,45 55,40 40,55'],
  'い': ['M30,25 C30,50 25,75 20,80', 'M70,35 Q65,60 60,70'],
  'う': ['M40,20 Q50,15 60,20', 'M25,40 Q60,35 65,55 C70,75 35,85 25,70'],
  'え': ['M40,20 Q50,15 60,20', 'M25,45 L70,45 L35,80 Q55,75 75,80'],
  'お': ['M20,35 L60,30', 'M45,15 L45,65 C45,85 20,80 25,60', 'M70,40 Q80,50 75,60'],
  'か': ['M25,35 Q60,25 55,50 C50,75 30,80 25,70', 'M45,15 L40,85', 'M70,30 L80,45'],
  'き': ['M25,30 L75,25', 'M25,45 L75,40', 'M50,15 L45,65', 'M35,70 C50,85 70,80 75,65'],
  'く': ['M65,25 L30,50 L70,75'],
  'け': ['M30,20 L25,80', 'M45,35 L80,30', 'M65,15 C65,50 60,75 55,85'],
  'こ': ['M30,30 Q60,25 70,30', 'M30,70 Q60,75 75,65']
};

const unitsData = {
  1: {
    stage1: [
      { id: 'u1_a', jp: 'あ', romaji: 'a' },
      { id: 'u1_i', jp: 'い', romaji: 'i' },
      { id: 'u1_u', jp: 'う', romaji: 'u' },
      { id: 'u1_e', jp: 'え', romaji: 'e' },
      { id: 'u1_o', jp: 'お', romaji: 'o' }
    ],
    stage2: [
      { id: 'u1_w1', jp: 'あい', zh: '愛', romaji: 'ai' },
      { id: 'u1_w2', jp: 'あお', zh: '藍色／青色', romaji: 'ao' },
      { id: 'u1_w3', jp: 'あう', zh: '見面', romaji: 'au' },
      { id: 'u1_w4', jp: 'いう', zh: '說', romaji: 'iu' },
      { id: 'u1_w5', jp: 'うえ', zh: '上面', romaji: 'ue' },
      { id: 'u1_w6', jp: 'おう', zh: '追', romaji: 'ou1' },
      { id: 'u1_w7', jp: 'おう', zh: '國王', romaji: 'ou2' }
    ]
  },
  2: {
    stage1: [
      { id: 'u2_ka', jp: 'か', romaji: 'ka' },
      { id: 'u2_ki', jp: 'き', romaji: 'ki' },
      { id: 'u2_ku', jp: 'く', romaji: 'ku' },
      { id: 'u2_ke', jp: 'け', romaji: 'ke' },
      { id: 'u2_ko', jp: 'こ', romaji: 'ko' }
    ],
    stage2: [
      { id: 'u2_w1', jp: 'あか', zh: '紅色', romaji: 'aka' },
      { id: 'u2_w2', jp: 'あき', zh: '秋天', romaji: 'aki' },
      { id: 'u2_w3', jp: 'あく', zh: '打開', romaji: 'aku' },
      { id: 'u2_w4', jp: 'いえ', zh: '家', romaji: 'ie' },
      { id: 'u2_w5', jp: 'いく', zh: '去', romaji: 'iku' },
      { id: 'u2_w6', jp: 'いか', zh: '魷魚／烏賊', romaji: 'ika' },
      { id: 'u2_w7', jp: 'いけ', zh: '池塘', romaji: 'ike' },
      { id: 'u2_w8', jp: 'えき', zh: '車站', romaji: 'eki' },
      { id: 'u2_w9', jp: 'おか', zh: '山丘', romaji: 'oka' }
    ]
  }
};

let currentUnit = 1;
let currentStage = 1; // 1: 認識字母, 2: 認識單字
let unlockedMaxStep = 1; // 當前解鎖的最大 Step (1~4 或 1~5)

let activePool = []; // 混搭卡片佇列
let currentTask = null; // 當前正在作答的項目 { item, step }
let previousCardId = null;

let totalTaskCount = 0;
let correctTaskCount = 0;

window.onload = () => {
  initStage();
};

function switchUnit() {
  currentUnit = parseInt(document.getElementById('unitSelect').value);
  currentStage = 1;
  initStage();
}

function initStage() {
  unlockedMaxStep = 1;
  totalTaskCount = 0;
  correctTaskCount = 0;

  // 根據階段載入原始資料
  let baseList = (currentStage === 1) 
    ? unitsData[currentUnit].stage1 
    : unitsData[currentUnit].stage2;

  // 初始化混搭池，放第一個解鎖 Step 的任務
  activePool = generateTasksForStep(baseList, 1);
  totalTaskCount = activePool.length;

  updateHeaderUI();
  loadNextCard();
}

// 根據指定的 Step 生成任務卡
function generateTasksForStep(itemList, step) {
  return itemList.map(item => ({ item, step }));
}

function updateHeaderUI() {
  const maxStep = (currentStage === 1) ? 4 : 5;
  document.getElementById('stageTitle').innerText = 
    `階段${currentStage === 1 ? '一：認識字母' : '二：認識單字'}`;
  document.getElementById('stepIndicator').innerText = `已解鎖題型: Step 1 ~ ${unlockedMaxStep}`;
  document.getElementById('queueIndicator').innerText = `待練習卡片: ${activePool.length}`;
  
  let progress = totalTaskCount > 0 ? (correctTaskCount / totalTaskCount) * 100 : 0;
  document.getElementById('progressBar').style.width = `${Math.min(progress, 100)}%`;
}

// 載入下一張題目
function loadNextCard() {
  hideFeedback();

  // 檢查是否需要混搭下一個 Step (當前題庫正確率 >= 60%)
  checkAndUnlockNextStep();

  if (activePool.length === 0) {
    completeStage();
    return;
  }

  // 隨機抽選卡片（防連續出現）
  activePool = shuffle(activePool);
  let cardIndex = 0;
  if (activePool.length > 1 && activePool[0].item.id === previousCardId) {
    cardIndex = 1;
  }

  currentTask = activePool.splice(cardIndex, 1)[0];
  previousCardId = currentTask.item.id;

  updateHeaderUI();
  renderCardUI();
}

// 判斷是否達標 60% 並解鎖下一個 Step 混搭
function checkAndUnlockNextStep() {
  const maxStep = (currentStage === 1) ? 4 : 5;
  
  if (unlockedMaxStep < maxStep) {
    let currentRate = totalTaskCount > 0 ? (correctTaskCount / totalTaskCount) * 100 : 0;
    
    // 正確率達到 60% 且目前佇列數量偏少，解鎖下一個 Step 的題型進來混搭
    if (currentRate >= 60 || activePool.length <= 2) {
      unlockedMaxStep++;
      let baseList = (currentStage === 1) ? unitsData[currentUnit].stage1 : unitsData[currentUnit].stage2;
      let newTasks = generateTasksForStep(baseList, unlockedMaxStep);
      
      activePool.push(...newTasks);
      totalTaskCount += newTasks.length;
      
      // 觸發解鎖動畫與提示
      triggerFireworks();
      updateHeaderUI();
    }
  }
}

// 渲染卡片核心介面
function renderCardUI() {
  const mainText = document.getElementById('mainText');
  const subText = document.getElementById('subText');
  const playAudioBtn = document.getElementById('playAudioBtn');
  const strokeContainer = document.getElementById('strokeContainer');
  const interactiveArea = document.getElementById('interactiveArea');

  interactiveArea.innerHTML = '';
  mainText.classList.remove('hidden');
  subText.classList.remove('hidden');
  playAudioBtn.classList.remove('hidden');
  strokeContainer.classList.add('hidden');

  const { item, step } = currentTask;

  // ========== 階段一 (認識字母) 混搭題型 ==========
  if (currentStage === 1) {
    if (step === 1) {
      // Step 1: 秀日文+羅馬音+筆劃動畫，用「我記得/再複習一次」自評
      mainText.innerText = item.jp;
      subText.innerText = item.romaji;
      renderStrokeAnimation(item.jp);
      playJpAudio(item.jp);
      renderSelfEvalButtons();
    } 
    else if (step === 2) {
      // Step 2: 秀日文選拼音
      mainText.innerText = item.jp;
      subText.innerText = '';
      renderOptions(unitsData[currentUnit].stage1, 'romaji', item.romaji);
    } 
    else if (step === 3) {
      // Step 3: 聽語音選日文
      mainText.innerText = '❓';
      subText.innerText = '';
      playJpAudio(item.jp);
      renderOptions(unitsData[currentUnit].stage1, 'jp', item.jp);
    } 
    else if (step === 4) {
      // Step 4: 只秀日文，自評發音與記憶
      mainText.innerText = item.jp;
      subText.innerText = '';
      renderSelfEvalButtons();
    }
  } 
  // ========== 階段二 (認識單字) 混搭題型 ==========
  else {
    if (step === 1) {
      // Step 1: 秀日文+中文，自評記憶
      mainText.innerText = item.jp;
      subText.innerText = item.zh;
      playJpAudio(item.jp);
      renderSelfEvalButtons();
    } 
    else if (step === 2) {
      // Step 2: 秀日文選中文
      mainText.innerText = item.jp;
      subText.innerText = '';
      renderOptions(unitsData[currentUnit].stage2, 'zh', item.zh);
    } 
    else if (step === 3) {
      // Step 3: 秀中文選日文
      mainText.innerText = item.zh;
      subText.innerText = '';
      renderOptions(unitsData[currentUnit].stage2, 'jp', item.jp);
    } 
    else if (step === 4) {
      // Step 4: 聽語音選日文
      mainText.innerText = '❓';
      subText.innerText = '';
      playJpAudio(item.jp);
      renderOptions(unitsData[currentUnit].stage2, 'jp', item.jp);
    } 
    else if (step === 5) {
      // Step 5: 只秀日文，自評記憶
      mainText.innerText = item.jp;
      subText.innerText = '';
      renderSelfEvalButtons();
    }
  }
}

// 筆畫動畫
function renderStrokeAnimation(char) {
  const strokeContainer = document.getElementById('strokeContainer');
  const svg = document.getElementById('strokeSvg');
  svg.innerHTML = '';

  const paths = strokePaths[char];
  if (paths) {
    strokeContainer.classList.remove('hidden');
    paths.forEach((d, index) => {
      const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      pathEl.setAttribute('d', d);
      pathEl.setAttribute('fill', 'none');
      pathEl.setAttribute('stroke', '#4A90E2');
      pathEl.setAttribute('stroke-width', '6');
      pathEl.setAttribute('stroke-linecap', 'round');
      pathEl.setAttribute('class', 'stroke-path');
      pathEl.style.animationDelay = `${index * 0.5}s`;
      svg.appendChild(pathEl);
    });
  }
}

// 渲染自評按鈕 (替代語音辨識)
function renderSelfEvalButtons() {
  const interactiveArea = document.getElementById('interactiveArea');
  const container = document.createElement('div');
  container.className = 'self-eval-container';

  const reviewBtn = document.createElement('button');
  reviewBtn.className = 'btn-review';
  reviewBtn.innerText = '🔴 再複習一次';
  reviewBtn.onclick = () => handleSelfEval(false);

  const rememberBtn = document.createElement('button');
  rememberBtn.className = 'btn-remember';
  rememberBtn.innerText = '🟢 我記得';
  rememberBtn.onclick = () => handleSelfEval(true);

  container.appendChild(reviewBtn);
  container.appendChild(rememberBtn);
  interactiveArea.appendChild(container);
}

// 渲染選擇題
function renderOptions(sourceList, key, correctAnswer) {
  const interactiveArea = document.getElementById('interactiveArea');
  const grid = document.createElement('div');
  grid.className = 'options-grid';

  let options = [correctAnswer];
  let pool = sourceList.map(item => item[key]).filter(val => val !== correctAnswer);
  pool = shuffle(pool);
  
  while (options.length < Math.min(4, sourceList.length)) {
    let pick = pool.pop();
    if (pick && !options.includes(pick)) options.push(pick);
  }
  options = shuffle(options);

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.innerText = opt;
    btn.onclick = () => handleOptionAnswer(opt === correctAnswer, correctAnswer);
    grid.appendChild(btn);
  });

  interactiveArea.appendChild(grid);
}

// 自評處理 (升級 / 降級)
function handleSelfEval(remembered) {
  if (remembered) {
    correctTaskCount++;
    playJpAudio(currentTask.item.jp);
    loadNextCard();
  } else {
    // 降級：放回題庫佇列，隨機重新複習
    activePool.push(currentTask);
    showFeedback(false, '已加入錯題複習佇列', `正確解答：${currentTask.item.jp} (${currentTask.item.romaji || currentTask.item.zh})`);
  }
}

// 選擇題回答處理
function handleOptionAnswer(isCorrect, correctAnswer) {
  if (isCorrect) {
    correctTaskCount++;
    playJpAudio(currentTask.item.jp);
    loadNextCard();
  } else {
    // 降級：放回佇列
    activePool.push(currentTask);
    showFeedback(false, '答錯了，進入錯題佇列！', `正解：${correctAnswer}`);
  }
}

function showFeedback(isCorrect, msg, correctInfo) {
  const panel = document.getElementById('feedbackPanel');
  const text = document.getElementById('feedbackText');
  const corrText = document.getElementById('correctAnswerText');

  panel.className = `feedback-panel ${isCorrect ? 'correct' : 'wrong'}`;
  text.innerText = msg;
  corrText.innerText = correctInfo;
  
  panel.style.display = 'flex';
}

function hideFeedback() {
  document.getElementById('feedbackPanel').style.display = 'none';
}

function nextCard() {
  loadNextCard();
}

// 通關切換
function completeStage() {
  triggerFireworks();
  playSuccessAudio();

  if (currentStage === 1) {
    alert(`🏆 恭喜完成【階段一：認識字母】！點擊確定解鎖進入【階段二：認識單字】`);
    currentStage = 2;
    initStage();
  } else {
    alert(`🎉 恭喜通關本單元所有單字！系統已將複習進度記錄於間隔重複學習（SRS）系統中！`);
  }
}

// 語音發音與音效
function playCurrentAudio() {
  if (currentTask && currentTask.item) {
    playJpAudio(currentTask.item.jp);
  }
}

function playJpAudio(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ja-JP';
    utterance.rate = 0.8;
    window.speechSynthesis.speak(utterance);
  }
}

function playSuccessAudio() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(523.25, ctx.currentTime);
  osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
  osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2);
  osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.3);
  
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
  
  osc.start();
  osc.stop(ctx.currentTime + 0.6);
}

function triggerFireworks() {
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 100,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
}

function shuffle(array) {
  let cur = array.length, rand;
  while (cur !== 0) {
    rand = Math.floor(Math.random() * cur);
    cur--;
    [array[cur], array[rand]] = [array[rand], array[cur]];
  }
  return array;
}
