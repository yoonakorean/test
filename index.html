<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓文單字印記學習</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --bg: #f5f7fa;
        }

        body {
            font-family: 'Noto Sans KR', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .progress-text {
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* 閃卡 3D 翻轉容器 */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 450px;
            margin-bottom: 20px;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
            cursor: pointer;
        }

        /* 控制翻轉的 Class */
        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background: white;
            box-sizing: border-box;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* 卡片正面 */
        .card-front {
            background: #ffffff;
        }

        /* 卡片反面 */
        .card-back {
            background: #fdfefe;
            transform: rotateY(180deg);
            justify-content: center; /* 讓內容完全置中 */
            gap: 20px;
        }

        /* 提示按鈕 */
        .hint-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #eee;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 圖片區 */
        .vocab-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            background: #eee; /* 沒圖片時的預留底色 */
        }

        /* 核心控制鈕（正面下方） */
        .control-group {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-audio { background: var(--primary); color: white; }
        .btn-record { background: #e67e22; color: white; }
        .btn-record.recording { background: var(--danger); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* 反面字體設計（完全置中） */
        .korean-word {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--dark);
            margin: 0;
        }

        .pronunciation {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin: 0;
        }

        /* 彈出小視窗 (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 80%;
            max-width: 300px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .modal-close {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            border: none; background: none;
            color: #aaa;
        }

        .modal-content h3 { margin-top: 0; font-size: 1.5rem; color: var(--primary); }
        .modal-content p { font-size: 1.2rem; margin: 10px 0 0 0; }

        /* 狀態提示文字 */
        .status-msg {
            font-size: 1rem;
            height: 24px;
            color: #7f8c8d;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 進度條文字 -->
    <div class="progress-text" id="progressText">載入中...</div>

    <!-- 閃卡容器 -->
    <div class="card-container">
        <!-- 點擊問號跳出提示 -->
        <button class="hint-btn" onclick="openModal(event)">?</button>
        
        <div class="card" id="vocabCard" onclick="flipCard()">
            <!-- 正面 -->
            <div class="card-face card-front">
                <!-- Canva 免費素材或 AI 生成圖預留位（可貼網址，不放就是灰色底色） -->
                <img src="" alt="單字圖片" class="vocab-img" id="vocabImg">
                <div class="control-group" onclick="event.stopPropagation();">
                    <button class="btn btn-audio" id="btnAudioFront" onclick="speakStandard()">🔊 播音</button>
                    <button class="btn btn-record" id="btnRecord" onclick="toggleRecord()">🎤 錄音</button>
                </div>
            </div>

            <!-- 反面 (完全置中) -->
            <div class="card-face card-back">
                <h1 class="korean-word" id="koreanWord">사과</h1>
                <p class="pronunciation" id="pronunciation">[sa-gwa]</p>
                <div onclick="event.stopPropagation();">
                    <button class="btn btn-audio" id="btnAudioBack" onclick="speakStandard()">🔊 播音</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 狀態回饋 -->
    <div class="status-msg" id="statusMsg">點擊卡片可翻面</div>
</div>

<!-- 中文與詞性提示小視窗 -->
<div class="modal-overlay" id="hintModal" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation();">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div class="modal-content">
            <h3 id="hintPart">詞性：名詞</h3>
            <p id="hintCh">中文：蘋果</p>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 這裡可以直接修改單字、發音法、中譯、詞性、圖片
    // 備註：已經移除舊有的 audio 欄位，發音改由 AI 原生自動合成
    // ==========================================
    const vocabList = [
        { 
            word: "사과", 
            pron: "sa-gwa",
            ch: "蘋果", 
            part: "名詞",
            img: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=400" 
        },
        { 
            word: "우유", 
            pron: "u-yu",
            ch: "牛奶", 
            part: "名詞",
            img: "https://images.unsplash.com/photo-1550583724-b2692b85b150?w=400" 
        }
    ];

    let currentPool = []; // 儲存當前單元還沒過關的隨機單字索引
    let currentIndex = 0; // 目前畫面上顯示的單字索引
    let isRecording = false;
    let recognition = null;
    let autoCloseTimer = null;

    // 初始化語音辨識
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ko-KR'; // 鎖定辨識語言為「韓文」
        recognition.interimResults = false;

        // 語音辨識成功回傳
        recognition.onresult = function(event) {
            clearTimeout(autoCloseTimer); // 有收到聲音，清除自動關閉計時器
            stopRecordState(); // 辨識結束，立刻自動關閉麥克風功能

            const studentSpeech = event.results[0][0].transcript.replace(/\s+/g, ""); // 去除空格
            const targetWord = vocabList[currentIndex].word.replace(/\s+/g, "");

            if (studentSpeech === targetWord) {
                document.getElementById('statusMsg').innerText = "🎉 太棒了！發音完全正確！";
                document.getElementById('statusMsg').style.color = "var(--success)";
                
                // 從隨機庫中移除此題
                currentPool = currentPool.filter(index => index !== currentIndex);
                
                // 延遲 1.5 秒後進下一題
                setTimeout(() => {
                    nextQuestion();
                }, 1500);
            } else {
                document.getElementById('statusMsg').innerText = `😢 聽起來像「${studentSpeech}」，再試一次！`;
                document.getElementById('statusMsg').style.color = "var(--danger)";
            }
        };

        // 處理錄音過程中，如果完全沒說話或辨識停止
        recognition.onend = function() {
            if (isRecording) {
                stopRecordState();
            }
        };

        recognition.onerror = function() {
            stopRecordState();
            document.getElementById('statusMsg').innerText = "錄音辨識出錯，請再試一次。";
        };
    } else {
        alert("很抱歉，您的瀏覽器不支援 Web Speech API 語音辨識，建議使用 Google Chrome 瀏覽器。");
    }

    // 初始化單元遊戲
    function initUnit() {
        currentPool = vocabList.map((_, i) => i);
        nextQuestion();
    }

    // 隨機下一題
    function nextQuestion() {
        const card = document.getElementById('vocabCard');
        card.classList.remove('is-flipped'); // 強制翻回正面

        if (currentPool.length === 0) {
            document.getElementById('progressText').innerText = "單元完成！";
            document.getElementById('statusMsg').innerText = "恭喜解鎖下一階段！🏆";
            localStorage.setItem("unit_completed", "true"); // 記錄結果至本地
            return;
        }

        // 從剩餘題庫中隨機抽一題
        const randomIndex = Math.floor(Math.random() * currentPool.length);
        currentIndex = currentPool[randomIndex];

        // 更新畫面資訊
        const data = vocabList[currentIndex];
        document.getElementById('vocabImg').src = data.img;
        document.getElementById('koreanWord').innerText = data.word;
        document.getElementById('pronunciation').innerText = `[ ${data.pron} ]`;
        document.getElementById('hintPart').innerText = `詞性：${data.part}`;
        document.getElementById('hintCh').innerText = `中文：${data.ch}`;
        
        const total = vocabList.length;
        const currentProgress = total - currentPool.length + 1;
        document.getElementById('progressText').innerText = `進度：${currentProgress} / ${total}`;
        document.getElementById('statusMsg').innerText = "點擊卡片可翻面觀看答案";
        document.getElementById('statusMsg').style.color = "#7f8c8d";
    }

    // 翻轉卡片
    function flipCard() {
        if (isRecording) return; // 如果正在錄音，不允許翻牌
        document.getElementById('vocabCard').classList.toggle('is-flipped');
    }

    // 🔊 播放標準女聲 (整合原生優質女聲發音系統)
    function speakStandard() {
        // 修正需求：錄音時不可以播放音檔
        if (isRecording) return; 

        // 串接當前卡片的單字 (vocabList[currentIndex].word)
        const targetText = vocabList[currentIndex].word;
        console.log("正在播放標準韓文女聲：" + targetText);
        
        try {
            window.speechSynthesis.cancel(); 

            const utterance = new SpeechSynthesisUtterance(targetText);
            utterance.lang = 'ko-KR'; 
            utterance.rate = 0.85; // 維持原設定之略慢速，方便學生聽得更清楚

            const voices = window.speechSynthesis.getVoices();
            
            // 強制過濾並選取最溫柔自然的韓語「女聲」發音人
            const femaleKoreanVoice = voices.find(v => v.lang.startsWith('ko') && 
                (v.name.toLowerCase().includes('female') || 
                 v.name.toLowerCase().includes('sunhi') || 
                 v.name.toLowerCase().includes('google') || 
                 v.name.toLowerCase().includes('siri') ||
                 v.name.toLowerCase().includes('yuna') ||
                 v.name.toLowerCase().includes('hj'))); 
            
            if (femaleKoreanVoice) {
                utterance.voice = femaleKoreanVoice;
                console.log("成功套用標準女聲: " + femaleKoreanVoice.name);
            } else {
                const defaultKo = voices.find(v => v.lang.startsWith('ko'));
                if (defaultKo) utterance.voice = defaultKo;
            }
            
            window.speechSynthesis.speak(utterance);

        } catch(e) {
            console.error("語音播放失敗：", e);
        }
    }

    // 預先觸發一次以喚醒 Chrome 的 getVoices 系統（防止部分手機和瀏覽器首發沒聲音）
    if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // 開啟/關閉 錄音功能
    function toggleRecord() {
        if (!recognition) return;

        if (!isRecording) {
            // 啟動錄音
            isRecording = true;
            document.getElementById('btnRecord').classList.add('recording');
            document.getElementById('btnRecord').innerText = "🛑 辨識中";
            document.getElementById('statusMsg').innerText = "請開始發音...";
            
            // 禁用播音按鈕防止誤觸
            document.getElementById('btnAudioFront').style.opacity = "0.5";
            document.getElementById('btnAudioBack').style.opacity = "0.5";

            recognition.start();

            // 畫面停滯（無聲音輸入）時，5 秒自動關閉麥克風
            autoCloseTimer = setTimeout(() => {
                if (isRecording) {
                    recognition.stop();
                    document.getElementById('statusMsg').innerText = "⏰ 偵測不到聲音，麥克風已關閉";
                    document.getElementById('statusMsg').style.color = "var(--danger)";
                }
            }, 5000);

        } else {
            // 手動停止錄音
            recognition.stop();
        }
    }

    // 重設錄音按鈕狀態，釋放麥克風
    function stopRecordState() {
        clearTimeout(autoCloseTimer);
        isRecording = false;
        document.getElementById('btnRecord').classList.remove('recording');
        document.getElementById('btnRecord').innerText = "🎤 錄音";
        document.getElementById('btnAudioFront').style.opacity = "1";
        document.getElementById('btnAudioBack').style.opacity = "1";
    }

    // 提示視窗控制
    function openModal(event) {
        event.stopPropagation(); // 阻止卡片翻轉
        document.getElementById('hintModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('hintModal').classList.remove('active');
    }

    // 網頁載入後啟動
    window.onload = initUnit;
</script>

</body>
</html>
