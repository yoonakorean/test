<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日語五十音與單字卡間隔學習系統</title>
  <!-- Canvas Confetti 煙火特效庫 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --primary: #4A90E2;
      --primary-hover: #357ABD;
      --success: #2ECC71;
      --error: #E74C3C;
      --warning: #F1C40F;
      --bg-color: #F7F9FC;
      --card-bg: #FFFFFF;
      --text-main: #2C3E50;
      --text-muted: #7F8C8D;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app-container {
      width: 100%;
      max-width: 550px;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
    }

    header {
      text-align: center;
      border-bottom: 2px solid #F0F3F7;
      padding-bottom: 15px;
    }

    header h1 {
      font-size: 1.4rem;
      color: var(--text-main);
      margin-bottom: 5px;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background-color: #E9ECEF;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--primary);
      transition: width 0.3s ease;
    }

    .nav-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .card {
      background: #FAFCFE;
      border: 2px solid #E2E8F0;
      border-radius: 16px;
      padding: 25px 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 250px;
      position: relative;
    }

    .card .main-text {
      font-size: 3.8rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.2;
    }

    .card .sub-text {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* 筆畫動態展示區 */
    .stroke-animation-container {
      width: 100px;
      height: 100px;
      border: 1px dashed #CBD5E1;
      border-radius: 12px;
      background: #FFFFFF;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 10px;
      position: relative;
    }

    .stroke-animation-container svg {
      width: 80px;
      height: 80px;
    }

    .stroke-path {
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawStroke 2.5s ease-in-out infinite;
    }

    @keyframes drawStroke {
      0% { stroke-dashoffset: 500; }
      50% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 0; }
    }

    .audio-btn {
      background: #EBF3FE;
      border: none;
      color: var(--primary);
      padding: 10px 18px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      transition: all 0.2s;
    }

    .audio-btn:hover {
      background: #D8E7FD;
    }

    .interactive-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      background-color: #FFFFFF;
      border: 2px solid #E2E8F0;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--primary);
      background-color: #F4F8FF;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      border: none;
      width: 100%;
    }

    .btn-primary:hover:not(:disabled) {
      background-color: var(--primary-hover);
    }

    .btn-secondary {
      background-color: #718096;
      color: white;
      border: none;
      width: 100%;
      padding: 12px;
      font-size: 0.95rem;
    }

    .btn-secondary:hover {
      background-color: #4A5568;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .speech-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .speech-btn {
      background-color: #FFF0F0;
      border: 2px solid #FFD6D6;
      color: #E74C3C;
      padding: 16px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .speech-btn.recording {
      background-color: #E74C3C;
      color: white;
      animation: pulse 1.5s infinite;
    }

    .speech-status {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
      70% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0); }
      100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
    }

    .feedback-panel {
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .feedback-panel.correct {
      background-color: #E8F8F0;
      color: #27AE60;
      border: 1px solid #A3E4D7;
      display: flex;
    }

    .feedback-panel.wrong {
      background-color: #FDEDEC;
      color: #C0392B;
      border: 1px solid #F9E79F;
      display: flex;
    }

    .feedback-panel .correct-answer {
      font-size: 0.95rem;
      color: var(--text-main);
    }

    .unit-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .unit-selector select {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #CBD5E1;
      font-size: 0.95rem;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="unit-selector">
      <select id="unitSelect" onchange="switchUnit()">
        <option value="1">單元一 (あ行字母 & 單字)</option>
        <option value="2">單元二 (か行字母 & 單字)</option>
      </select>
    </div>
    <h1 id="stageTitle">階段一：認識字母</h1>
    <div class="nav-controls">
      <span id="stepIndicator">Step 1 / 4</span>
      <span id="queueIndicator">剩餘卡片: 0</span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </header>

  <!-- 卡片主體區 -->
  <div class="card" id="cardArea">
    <div class="stroke-animation-container hidden" id="strokeContainer">
      <svg id="strokeSvg" viewBox="0 0 100 100"></svg>
    </div>

    <div class="main-text" id="mainText">あ</div>
    <div class="sub-text" id="subText">a</div>
    <button class="audio-btn" id="playAudioBtn" onclick="playCurrentAudio()">
      🔊 播放發音
    </button>
  </div>

  <!-- 反饋與解答提示區 -->
  <div class="feedback-panel" id="feedbackPanel">
    <div id="feedbackText">答對了！</div>
    <div class="correct-answer hidden" id="correctAnswerText"></div>
    <button class="btn btn-secondary hidden" id="forcePassBtn" onclick="forcePassCard()">我確定唸對（強制通過）</button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextCard()">繼續</button>
  </div>

  <!-- 互動輸入區 -->
  <div class="interactive-area" id="interactiveArea"></div>
</div>

<script>
const strokePaths = {
  'あ': ['M20,35 Q50,30 80,35', 'M50,15 Q45,60 48,85', 'M35,45 C20,70 60,90 75,65 C85,45 55,40 40,55'],
  'い': ['M30,25 C30,50 25,75 20,80', 'M70,35 Q65,60 60,70'],
  'う': ['M40,20 Q50,15 60,20', 'M25,40 Q60,35 65,55 C70,75 35,85 25,70'],
  'え': ['M40,20 Q50,15 60,20', 'M25,45 L70,45 L35,80 Q55,75 75,80'],
  'お': ['M20,35 L60,30', 'M45,15 L45,65 C45,85 20,80 25,60', 'M70,40 Q80,50 75,60'],
  'か': ['M25,35 Q60,25 55,50 C50,75 30,80 25,70', 'M45,15 L40,85', 'M70,30 L80,45'],
  'き': ['M25,30 L75,25', 'M25,45 L75,40', 'M50,15 L45,65', 'M35,70 C50,85 70,80 75,65'],
  'く': ['M65,25 L30,50 L70,75'],
  'け': ['M30,20 L25,80', 'M45,35 L80,30', 'M65,15 C65,50 60,75 55,85'],
  'こ': ['M30,30 Q60,25 70,30', 'M30,70 Q60,75 75,65']
};

const unitsData = {
  1: {
    stage1: [
      { id: 'u1_a', jp: 'あ', romaji: 'a' },
      { id: 'u1_i', jp: 'い', romaji: 'i' },
      { id: 'u1_u', jp: 'う', romaji: 'u' },
      { id: 'u1_e', jp: 'え', romaji: 'e' },
      { id: 'u1_o', jp: 'お', romaji: 'o' }
    ],
    stage2: [
      { id: 'u1_w1', jp: 'あい', zh: '愛', romaji: 'ai' },
      { id: 'u1_w2', jp: 'あお', zh: '藍色／青色', romaji: 'ao' },
      { id: 'u1_w3', jp: 'あう', zh: '見面', romaji: 'au' },
      { id: 'u1_w4', jp: 'いう', zh: '說', romaji: 'iu' },
      { id: 'u1_w5', jp: 'うえ', zh: '上面', romaji: 'ue' },
      { id: 'u1_w6', jp: 'おう', zh: '追', romaji: 'ou1' },
      { id: 'u1_w7', jp: 'おう', zh: '國王', romaji: 'ou2' }
    ]
  },
  2: {
    stage1: [
      { id: 'u2_ka', jp: 'か', romaji: 'ka' },
      { id: 'u2_ki', jp: 'き', romaji: 'ki' },
      { id: 'u2_ku', jp: 'く', romaji: 'ku' },
      { id: 'u2_ke', jp: 'け', romaji: 'ke' },
      { id: 'u2_ko', jp: 'こ', romaji: 'ko' }
    ],
    stage2: [
      { id: 'u2_w1', jp: 'あか', zh: '紅色', romaji: 'aka' },
      { id: 'u2_w2', jp: 'あき', zh: '秋天', romaji: 'aki' },
      { id: 'u2_w3', jp: 'あく', zh: '打開', romaji: 'aku' },
      { id: 'u2_w4', jp: 'いえ', zh: '家', romaji: 'ie' },
      { id: 'u2_w5', jp: 'いく', zh: '去', romaji: 'iku' },
      { id: 'u2_w6', jp: 'いか', zh: '魷魚／烏賊', romaji: 'ika' },
      { id: 'u2_w7', jp: 'いけ', zh: '池塘', romaji: 'ike' },
      { id: 'u2_w8', jp: 'えき', zh: '車站', romaji: 'eki' },
      { id: 'u2_w9', jp: 'おか', zh: '山丘', romaji: 'oka' }
    ]
  }
};

let currentUnit = 1;
let currentStage = 1;
let currentStep = 1;
let cardQueue = [];
let currentCard = null;
let previousCardId = null;
let totalCardsCount = 0;
let firstTryCorrectCount = 0;
let isSecondAttempt = false;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isRecording = false;

window.onload = () => {
  initStage();
};

function switchUnit() {
  stopListening();
  currentUnit = parseInt(document.getElementById('unitSelect').value);
  currentStage = 1;
  initStage();
}

function initStage() {
  stopListening();
  firstTryCorrectCount = 0;
  
  let baseList = (currentStage === 1) 
    ? unitsData[currentUnit].stage1 
    : unitsData[currentUnit].stage2;

  cardQueue = shuffle([...baseList]);
  totalCardsCount = cardQueue.length;
  
  updateHeaderUI();
  loadNextCardInStep();
}

function updateHeaderUI() {
  document.getElementById('stageTitle').innerText = 
    `階段${currentStage === 1 ? '一：認識字母' : '二：認識單字'}`;
  document.getElementById('stepIndicator').innerText = `Step ${currentStep} / ${currentStage === 1 ? 4 : 5}`;
  document.getElementById('queueIndicator').innerText = `剩餘卡片: ${cardQueue.length}`;
  
  let progress = ((totalCardsCount - cardQueue.length) / totalCardsCount) * 100;
  document.getElementById('progressBar').style.width = `${Math.max(progress, 0)}%`;
}

function loadNextCardInStep() {
  stopListening();
  hideFeedback();
  isSecondAttempt = false;

  if (cardQueue.length === 0) {
    checkStagePromotion();
    return;
  }

  let cardIndex = 0;
  if (cardQueue.length > 1 && cardQueue[0].id === previousCardId) {
    cardIndex = 1;
  }

  currentCard = cardQueue.splice(cardIndex, 1)[0];
  previousCardId = currentCard.id;

  updateHeaderUI();
  renderCardUI();
}

function renderCardUI() {
  const mainText = document.getElementById('mainText');
  const subText = document.getElementById('subText');
  const playAudioBtn = document.getElementById('playAudioBtn');
  const strokeContainer = document.getElementById('strokeContainer');
  const interactiveArea = document.getElementById('interactiveArea');

  interactiveArea.innerHTML = '';
  mainText.classList.remove('hidden');
  subText.classList.remove('hidden');
  playAudioBtn.classList.remove('hidden');
  strokeContainer.classList.add('hidden');

  if (currentStage === 1) {
    if (currentStep === 1) {
      mainText.innerText = currentCard.jp;
      subText.innerText = currentCard.romaji;
      renderStrokeAnimation(currentCard.jp);
      playJpAudio(currentCard.jp);
      renderSpeechInput(true);
    } 
    else if (currentStep === 2) {
      mainText.innerText = currentCard.jp;
      subText.innerText = '';
      renderOptions(unitsData[currentUnit].stage1, 'romaji', currentCard.romaji);
    } 
    else if (currentStep === 3) {
      mainText.innerText = '❓';
      subText.innerText = '';
      playJpAudio(currentCard.jp);
      renderOptions(unitsData[currentUnit].stage1, 'jp', currentCard.jp);
    } 
    else if (currentStep === 4) {
      mainText.innerText = currentCard.jp;
      subText.innerText = '';
      renderSpeechInput(false);
    }
  } 
  else {
    if (currentStep === 1) {
      mainText.innerText = currentCard.jp;
      subText.innerText = currentCard.zh;
      playJpAudio(currentCard.jp);
      renderSpeechInput(true);
    } 
    else if (currentStep === 2) {
      mainText.innerText = currentCard.jp;
      subText.innerText = '';
      renderOptions(unitsData[currentUnit].stage2, 'zh', currentCard.zh);
    } 
    else if (currentStep === 3) {
      mainText.innerText = currentCard.zh;
      subText.innerText = '';
      renderOptions(unitsData[currentUnit].stage2, 'jp', currentCard.jp);
    } 
    else if (currentStep === 4) {
      mainText.innerText = '❓';
      subText.innerText = '';
      playJpAudio(currentCard.jp);
      renderOptions(unitsData[currentUnit].stage2, 'jp', currentCard.jp);
    } 
    else if (currentStep === 5) {
      mainText.innerText = currentCard.jp;
      subText.innerText = '';
      renderSpeechInput(false);
    }
  }
}

function renderStrokeAnimation(char) {
  const strokeContainer = document.getElementById('strokeContainer');
  const svg = document.getElementById('strokeSvg');
  svg.innerHTML = '';

  const paths = strokePaths[char];
  if (paths) {
    strokeContainer.classList.remove('hidden');
    paths.forEach((d, index) => {
      const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      pathEl.setAttribute('d', d);
      pathEl.setAttribute('fill', 'none');
      pathEl.setAttribute('stroke', '#4A90E2');
      pathEl.setAttribute('stroke-width', '6');
      pathEl.setAttribute('stroke-linecap', 'round');
      pathEl.setAttribute('class', 'stroke-path');
      pathEl.style.animationDelay = `${index * 0.5}s`;
      svg.appendChild(pathEl);
    });
  }
}

function renderOptions(sourceList, key, correctAnswer) {
  const interactiveArea = document.getElementById('interactiveArea');
  const grid = document.createElement('div');
  grid.className = 'options-grid';

  let options = [correctAnswer];
  let pool = sourceList.map(item => item[key]).filter(val => val !== correctAnswer);
  pool = shuffle(pool);
  
  while (options.length < Math.min(4, sourceList.length)) {
    let pick = pool.pop();
    if (pick && !options.includes(pick)) options.push(pick);
  }
  options = shuffle(options);

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.innerText = opt;
    btn.onclick = () => handleAnswer(opt === correctAnswer, correctAnswer);
    grid.appendChild(btn);
  });

  interactiveArea.appendChild(grid);
}

function renderSpeechInput(autoAdvanceOnSuccess) {
  const interactiveArea = document.getElementById('interactiveArea');
  
  const container = document.createElement('div');
  container.className = 'speech-container';

  const speechBtn = document.createElement('button');
  speechBtn.className = 'speech-btn';
  speechBtn.id = 'speechBtn';
  speechBtn.innerHTML = '🎤 按下開始跟讀/口說';
  speechBtn.onclick = () => toggleListening(autoAdvanceOnSuccess);

  const statusText = document.createElement('div');
  statusText.className = 'speech-status';
  statusText.id = 'speechStatus';
  statusText.innerText = '點擊按鈕授權麥克風進行發音測驗，或直接點擊「我確定唸對」';

  container.appendChild(speechBtn);
  container.appendChild(statusText);
  interactiveArea.appendChild(container);

  // 在 Step 1 自動直接提供救援通關選項
  if (currentStep === 1) {
    showFeedback(true, '請點擊麥克風練習發音，或直接點擊「我確定唸對」完成跟讀', '', true);
  }
}

function toggleListening(autoAdvance) {
  if (isRecording) {
    stopListening();
  } else {
    startListening(autoAdvance);
  }
}

function startListening(autoAdvance) {
  if (!SpeechRecognition) {
    updateSpeechStatus('瀏覽器不支援 Speech API，請直接點擊「我確定唸對」。');
    showFeedback(false, '瀏覽器不支援語音收音', '請點擊下方按鈕強制通過', true);
    return;
  }

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(() => {
      runRecognition(autoAdvance);
    })
    .catch((err) => {
      updateSpeechStatus('⚠️ 麥克風未授權，請直接點擊「我確定唸對」。');
      showFeedback(false, '無法存取麥克風', '請點擊下方按鈕強制通過', true);
    });
}

function runRecognition(autoAdvance) {
  try {
    recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    const speechBtn = document.getElementById('speechBtn');
    if (speechBtn) {
      speechBtn.classList.add('recording');
      speechBtn.innerHTML = '🎙️ 錄音中...請發音';
    }
    updateSpeechStatus('系統聆聽中，請唸出日文...');

    isRecording = true;
    recognition.start();

    recognition.onresult = (event) => {
      stopListening();

      const resultText = event.results[0][0].transcript;
      updateSpeechStatus(`辨識結果：${resultText}`);

      let isMatch = checkPronunciationMatch(resultText, currentCard.jp);

      if (isMatch) {
        if (!isSecondAttempt) {
          firstTryCorrectCount++;
        }
        showFeedback(true, '語音辨識成功！', '', false);
      } else {
        isSecondAttempt = true;
        if (!cardQueue.some(c => c.id === currentCard.id)) {
          cardQueue.push(currentCard);
        }
        showFeedback(false, `辨識為「${resultText}」，未達標準`, `目標發音：${currentCard.jp}`, true);
      }
    };

    recognition.onerror = (event) => {
      stopListening();
      updateSpeechStatus(`收音超時或出錯`);
      showFeedback(false, '未檢測到聲音', `目標發音：${currentCard.jp}`, true);
    };

    recognition.onend = () => {
      stopListening();
    };

  } catch (e) {
    updateSpeechStatus('語音系統初始化失敗');
    showFeedback(false, '語音系統異常', '', true);
  }
}

function stopListening() {
  isRecording = false;
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }
  const speechBtn = document.getElementById('speechBtn');
  if (speechBtn) {
    speechBtn.classList.remove('recording');
    speechBtn.innerHTML = '🎤 按下開始跟讀/口說';
  }
}

function updateSpeechStatus(msg) {
  const statusEl = document.getElementById('speechStatus');
  if (statusEl) statusEl.innerText = msg;
}

function checkPronunciationMatch(spoken, target) {
  spoken = spoken.trim().toLowerCase();
  target = target.trim().toLowerCase();
  return spoken === target || spoken.includes(target) || target.includes(spoken);
}

// 【修復的核心】：點擊「我確定唸對」時正確累加分數並把卡片算作通關
function forcePassCard() {
  stopListening();
  cardQueue = cardQueue.filter(c => c.id !== currentCard.id);
  
  if (!isSecondAttempt) {
    firstTryCorrectCount++;
  }
  
  playJpAudio(currentCard.jp);
  showFeedback(true, '確認跟讀完成！點擊「繼續」進入下一題', '', false);
}

function handleAnswer(isCorrect, correctAnswer) {
  stopListening();
  if (isCorrect) {
    if (!isSecondAttempt) {
      firstTryCorrectCount++;
    }
    playJpAudio(currentCard.jp);
    showFeedback(true, '答對了！', '', false);
  } else {
    if (!cardQueue.some(c => c.id === currentCard.id)) {
      cardQueue.push(currentCard);
    }
    showFeedback(false, '答錯了！', `正確解答：${correctAnswer}`, false);
  }
}

function showFeedback(isCorrect, msg, correctInfo, showForcePass = false) {
  const panel = document.getElementById('feedbackPanel');
  const text = document.getElementById('feedbackText');
  const corrText = document.getElementById('correctAnswerText');
  const forcePassBtn = document.getElementById('forcePassBtn');

  panel.className = `feedback-panel ${isCorrect ? 'correct' : 'wrong'}`;
  text.innerText = msg;

  if (correctInfo) {
    corrText.innerText = correctInfo;
    corrText.classList.remove('hidden');
  } else {
    corrText.classList.add('hidden');
  }

  if (showForcePass) {
    forcePassBtn.classList.remove('hidden');
  } else {
    forcePassBtn.classList.add('hidden');
  }

  panel.style.display = 'flex';
}

function hideFeedback() {
  document.getElementById('feedbackPanel').style.display = 'none';
  document.getElementById('forcePassBtn').classList.add('hidden');
}

function nextCard() {
  stopListening();
  loadNextCardInStep();
}

// 自動晉級判定
function checkStagePromotion() {
  let successRate = (firstTryCorrectCount / totalCardsCount) * 100;
  
  if (successRate >= 80) {
    triggerFireworks();
    playSuccessAudio();

    let maxStep = currentStage === 1 ? 4 : 5;
    if (currentStep < maxStep) {
      alert(`🎉 太棒了！本 Step 完成度 ${Math.round(successRate)}%！自動晉級進入 Step ${currentStep + 1}`);
      currentStep++;
      initStage();
    } else {
      if (currentStage === 1) {
        alert(`🏆 恭喜完成【階段一：認識字母】！即將進入【階段二：認識單字】`);
        currentStage = 2;
        initStage();
      } else {
        alert(`🎉 恭喜通關本單元所有階段！間隔重複學習系統已自動為您紀錄。`);
      }
    }
  } else {
    alert(`完成度為 ${Math.round(successRate)}%（未達80%標準）。將為您重新排程本 Step 練習！`);
    initStage();
  }
}

function playCurrentAudio() {
  if (currentCard) {
    playJpAudio(currentCard.jp);
  }
}

function playJpAudio(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ja-JP';
    utterance.rate = 0.8;
    window.speechSynthesis.speak(utterance);
  }
}

function playSuccessAudio() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(523.25, ctx.currentTime);
  osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
  osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2);
  osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.3);
  
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
  
  osc.start();
  osc.stop(ctx.currentTime + 0.6);
}

function triggerFireworks() {
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 100,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
}

function shuffle(array) {
  let cur = array.length, rand;
  while (cur !== 0) {
    rand = Math.floor(Math.random() * cur);
    cur--;
    [array[cur], array[rand]] = [array[rand], array[cur]];
  }
  return array;
}
